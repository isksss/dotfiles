#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
sort_fallback = "alphabetical"
linemode = "mtime"
show_hidden = true
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll", "drag"]

[preview]
wrap = "yes"
tab_size = 2

[plugin]
prepend_previewers = [
  { url = "*.md", run = 'piper -- leaf --inline "ansi:$w" "$1"' },
]

[opener]
edit = [
  { run = '${EDITOR:-vi} %s', desc = "$EDITOR", for = "unix", block = true },
  { run = "code %s", desc = "code", for = "windows", orphan = true },
  { run = "code -w %s", desc = "code (block)", for = "windows", block = true },
]
