min_version = "2026.7.5"

[settings]
dotfiles.root = "~/dotfiles/dotfiles"
dotfiles.default_mode = "symlink"

[tools]
# shell / cli
"aqua:eza-community/eza" = "latest"
atuin = "latest"
bat = "latest"
delta = "latest"
fzf = "latest"
ghq = "latest"
jq = "latest"
lazydocker = "latest"
lazygit = "latest"
neovim = "latest"
ripgrep = "latest"
starship = "latest"
tree-sitter = "latest"
"usage" = "latest"
yazi = "latest"
zellij = "latest"
zoxide = "latest"

# shell enhancement
"cargo:sheldon" = "latest"
shfmt = "latest"

# vcs / forge
glab = { version = "latest", exe = "glab" }

# runtimes
deno = "latest"
go = "latest"
java = "temurin-25"
node = "24"
python = "latest"
uv = "latest"

# go tools
"go:github.com/d-kuro/gwq/cmd/gwq" = "latest"
"go:github.com/isksss/sqio/cmd/sqio" = "latest"

# npm tools
"npm:@antfu/ni" = "latest"
"npm:@github/copilot" = "latest"
"npm:@openai/codex" = "latest"
"npm:@playwright/cli" = "latest"
"npm:playwright" = "latest"
"npm:opencode-ai" = { version = "latest", npm_args = "--ignore-scripts=false" }

# alt shell
"aqua:nushell/nushell" = "latest"
rust = "latest"
gh = "latest"
"npm:@marp-team/marp-cli" = "latest"
terraform = "latest"
"github:ogulcancelik/herdr" = "latest"
pnpm = "latest"
cloudflared = "latest"
"npm:@devcontainers/cli" = "latest"
"aqua:jorgerojas26/lazysql" = "latest"
"npm:@officecli/officecli" = "latest"
"npm:@rivolink/leaf" = "latest"

[dotfiles]
"~/.bashrc" = {}
"~/.vimrc" = {}
"~/.zshenv" = {}
"~/.local/bin/update" = {}
"~/.config/Code/User" = {}
"~/.config/alacritty" = {}
"~/.config/atuin" = {}
"~/.config/ghq" = {}
"~/.config/git" = {}
"~/.config/gwq" = {}
"~/.config/herdr" = {}
"~/.config/lazygit" = {}
"~/.config/mise/config.toml" = "~/dotfiles/mise.toml"
"~/.config/nvim" = {}
"~/.config/ollama" = {}
"~/.config/opencode" = {}
"~/.config/sheldon" = {}
"~/.config/starship.toml" = {}
"~/.config/tmux" = {}
"~/.config/yazi" = {}
"~/.config/zellij" = {}
"~/.config/zsh" = {}
"~/.wallpapers" = {}
"~/.agents/AGENTS.md" = "~/dotfiles/.agents/AGENTS.md"
"~/.agents/skills/branch" = "~/dotfiles/.agents/skills/branch"
"~/.agents/skills/commit" = "~/dotfiles/.agents/skills/commit"
"~/.agents/skills/grill-me" = "~/dotfiles/.agents/skills/grill-me"
"~/.agents/skills/implement" = "~/dotfiles/.agents/skills/implement"
"~/.agents/skills/merge-request" = "~/dotfiles/.agents/skills/merge-request"
"~/.agents/skills/research" = "~/dotfiles/.agents/skills/research"
"~/.agents/skills/review" = "~/dotfiles/.agents/skills/review"


[shell_alias]

[env]
EDITOR = "nvim"
LANG = "ja_JP.UTF-8"
LC_ALL = "ja_JP.UTF-8"
PAGER = "bat"

STARSHIP_CONFIG = "{{env.XDG_CONFIG_HOME}}/starship.toml"

XDG_CACHE_HOME = "{{env.HOME}}/.cache"
XDG_CONFIG_HOME = "{{env.HOME}}/.config"
XDG_DATA_HOME = "{{env.HOME}}/.local/share"
XDG_STATE_HOME = "{{env.HOME}}/.local/state"
