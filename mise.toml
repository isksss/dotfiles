"aqua:sharkdp/fd" = "latest"
"aqua:starship/starship" = "1.24.2"
"aqua:jqlang/jq" = "latest"
"aqua:jesseduffield/lazygit" = "latest"
"aqua:jesseduffield/lazydocker" = "latest"
"aqua:zellij-org/zellij" = "latest"
"npm:@antfu/ni" = "latest"
"github:neovim/neovim" = "latest"
"aqua:FiloSottile/age" = "latest"
# 1password-cli = "latest"
gh = "latest"
glab = "latest"

# 言語
go = "latest"
deno = "latest"
java = "temurin-8"
node = "24"

# AI
"npm:@openai/codex" = "latest"
ghq = "latest"
shfmt = "latest"

[shell_alias]
# 基本
cl = "clear"

# 追加ツール
ls = "eza"
