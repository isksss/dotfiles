set-option -g default-terminal "tmux-256color"
set-option -ag terminal-overrides ",xterm-256color:RGB"

set-option -g mouse on
set-option -g history-limit 100000
set-option -g escape-time 10
set-option -g focus-events on
set-option -g set-clipboard on
set-option -g detach-on-destroy off
set-option -g display-time 2000
set-option -g display-panes-time 2000

set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on

setw -g mode-keys vi

set-option -g pane-border-lines heavy
set-option -g pane-border-style "fg=colour238"
set-option -g pane-active-border-style "fg=colour82,bold"

set-option -g status-position bottom
set-option -g status-interval 5
set-option -g status-justify centre
set-option -g status-style "bg=colour235,fg=colour250"
set-option -g status-left-length 120
set-option -g status-left "#[fg=colour235,bg=colour39,bold] #S #[fg=colour39,bg=colour236,nobold]î‚°#[fg=colour250,bg=colour236] #I:#P #[fg=colour236,bg=colour238]î‚°#[fg=colour250,bg=colour238] #{pane_current_path} #[fg=colour238,bg=colour235]î‚°"
set-option -g status-right-length 90
set-option -g status-right "#[fg=colour238,bg=colour235]î‚˛#[fg=colour250,bg=colour238] #H #[fg=colour236,bg=colour238]î‚˛#[fg=colour250,bg=colour236] %Y-%m-%d #[fg=colour39,bg=colour236]î‚˛#[fg=colour235,bg=colour39,bold] %H:%M "
set-window-option -g window-status-separator ""
set-window-option -g window-status-style "fg=colour244,bg=colour235"
set-window-option -g window-status-format "#[fg=colour238,bg=colour235]î‚°#[fg=colour250,bg=colour238] #I #{b:pane_current_path} #[fg=colour238,bg=colour235]î‚°"
set-window-option -g window-status-current-style "fg=colour235,bg=colour82,bold"
set-window-option -g window-status-current-format "#[fg=colour82,bg=colour235]î‚°#[fg=colour235,bg=colour82,bold] #I #{b:pane_current_path} #[fg=colour82,bg=colour235,nobold]î‚°"

bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5

bind-key [ previous-window
bind-key ] next-window
bind-key Tab last-window
bind-key x confirm-before -p "kill-pane #P? (y/n)" kill-pane

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
